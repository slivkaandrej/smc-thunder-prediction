name: SMC Daily Reports

on:
  schedule:
    - cron: "15 5 * * *"   # 07:15 Zagreb (UTC+2)
    - cron: "28 13 * * *"  # 15:18 Zagreb (UTC+2)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install requests
        run: pip install requests

      - name: Debug env
        run: |
          echo "TOKEN length: ${#TELEGRAM_TOKEN}"
          echo "CHAT_ID: $TELEGRAM_CHAT_ID"
          echo "MODE: $MODE"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODE: "report"

      - name: Run report
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODE: "report"
        run: python smc_thunder.py
